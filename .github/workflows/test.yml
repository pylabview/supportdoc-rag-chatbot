name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      - name: Sync dev tools
        run: uv sync --locked --extra dev-tools

      - name: Run tests
        run: uv run pytest -q
