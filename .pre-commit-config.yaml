repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: ^docs/.*\.md$
      - id: check-yaml
      - id: check-toml
      - id: check-json

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (auto-fix locally)
        entry: uv run ruff check --fix
        language: system
        types_or: [python, pyi]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]
        pass_filenames: true
